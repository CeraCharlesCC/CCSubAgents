name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example -> v0.1.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "manual-release must run from main; current ref is ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ccsubagents/go.mod

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "darwin amd64"
            "darwin arm64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"${target}"
            ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi

            suffix="${goos}-${goarch}"
            (cd ccsubagents && CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -o "$GITHUB_WORKSPACE/dist/ccsubagents-${suffix}${ext}" ./cmd/ccsubagents)
            (cd local-artifact && CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -o "$GITHUB_WORKSPACE/dist/local-artifact-mcp-${suffix}${ext}" ./cmd/local-artifact-mcp)
            (cd local-artifact && CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -o "$GITHUB_WORKSPACE/dist/local-artifact-web-${suffix}${ext}" ./cmd/local-artifact-web)
          done

          (cd dist && zip -j local-artifact.zip local-artifact-mcp-* local-artifact-web-*)
          (cd definition/.github/agents && zip -r "$GITHUB_WORKSPACE/dist/agents.zip" .)

      - name: Attest agents.zip
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/agents.zip

      - name: Attest local-artifact.zip
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/local-artifact.zip

      - name: Attest ccsubagents-linux-amd64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ccsubagents-linux-amd64

      - name: Attest ccsubagents-linux-arm64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ccsubagents-linux-arm64

      - name: Attest ccsubagents-windows-amd64.exe
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ccsubagents-windows-amd64.exe

      - name: Attest ccsubagents-darwin-amd64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ccsubagents-darwin-amd64

      - name: Attest ccsubagents-darwin-arm64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/ccsubagents-darwin-arm64

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/agents.zip \
            dist/local-artifact.zip \
            dist/ccsubagents-linux-amd64 \
            dist/ccsubagents-linux-arm64 \
            dist/ccsubagents-windows-amd64.exe \
            dist/ccsubagents-darwin-amd64 \
            dist/ccsubagents-darwin-arm64 \
            --target main \
            --title "$RELEASE_TAG" \
            --notes "Manual release from main"

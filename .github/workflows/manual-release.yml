name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example -> v0.1.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "manual-release must run from main; current ref is ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            (cd ccsubagents && CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -o "$GITHUB_WORKSPACE/dist/ccsubagents_${goos}_${goarch}${ext}" ./cmd/ccsubagents)

            bundle_dir="$(mktemp -d)"
            (cd local-artifact && CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -o "$bundle_dir/local-artifact-mcp${ext}" ./cmd/local-artifact-mcp)
            (cd local-artifact && CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -o "$bundle_dir/local-artifact-web${ext}" ./cmd/local-artifact-web)
            (cd "$bundle_dir" && zip -j "$GITHUB_WORKSPACE/dist/local-artifact_${goos}_${goarch}.zip" "local-artifact-mcp${ext}" "local-artifact-web${ext}")
            rm -rf "$bundle_dir"
          done

          (cd definition/.github/agents && zip -r "$GITHUB_WORKSPACE/dist/agents.zip" .)

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish local-artifact release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          LOCAL_ARTIFACT_TAG="local-artifact/${RELEASE_TAG}"
          gh release create "$LOCAL_ARTIFACT_TAG" \
            dist/local-artifact_*.zip \
            --target main \
            --title "$LOCAL_ARTIFACT_TAG" \
            --notes "local-artifact bundles"

      - name: Publish main release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/agents.zip \
            dist/ccsubagents_* \
            --target main \
            --title "$RELEASE_TAG" \
            --notes "Manual release from main"

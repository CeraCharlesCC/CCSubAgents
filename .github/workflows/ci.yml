name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: local-artifact
            go-version-file: local-artifact/go.mod
          - module: ccsubagents
            go-version-file: ccsubagents/go.mod
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.go-version-file }}

      - name: Check gofmt
        run: |
          mapfile -t go_files < <(find . -name '*.go' -type f)
          if [ "${#go_files[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Lint module
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          working-directory: ${{ matrix.module }}
          args: --config=../.golangci.yml ./...

  test-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: local-artifact
            go-version-file: local-artifact/go.mod
            os: ubuntu-latest
          - module: local-artifact
            go-version-file: local-artifact/go.mod
            os: windows-latest
          - module: local-artifact
            go-version-file: local-artifact/go.mod
            os: macos-14
          - module: ccsubagents
            go-version-file: ccsubagents/go.mod
            os: ubuntu-latest
          - module: ccsubagents
            go-version-file: ccsubagents/go.mod
            os: windows-latest
          - module: ccsubagents
            go-version-file: ccsubagents/go.mod
            os: macos-14
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.go-version-file }}

      - name: Test module
        run: go test ./...

      - name: Build module binaries
        run: |
          set -euo pipefail
          ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ext=".exe"
          fi

          if [[ "${{ matrix.module }}" == "ccsubagents" ]]; then
            go build -o "$RUNNER_TEMP/ccsubagents${ext}" ./cmd/ccsubagents
          else
            go build -o "$RUNNER_TEMP/local-artifact-mcp${ext}" ./cmd/local-artifact-mcp
            go build -o "$RUNNER_TEMP/local-artifact-web${ext}" ./cmd/local-artifact-web
          fi

  linux-arm64-cross-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: local-artifact/go.mod

      - name: Cross-compile linux/arm64 binaries
        run: |
          set -euo pipefail
          (cd ccsubagents && env CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/ccsubagents)
          (cd local-artifact && env CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/local-artifact-mcp)
          (cd local-artifact && env CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/local-artifact-web)
